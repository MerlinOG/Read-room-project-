<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Reading Room</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
--bg:#eef4ff;
--card:#ffffff;
--text:#1b1f3b;
--accent:#0066cc;
--accent2:#000000;
}
body.dark{--bg:#0f172a;--card:#1e293b;--text:#f8fafc;}
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,var(--bg),#cfe3ff);
color:var(--text);
}
header{
background:linear-gradient(135deg,var(--accent),var(--accent2));
color:#fff;
padding:24px;
text-align:center;
box-shadow:0 4px 12px rgba(0,0,0,.15);
}
.hero{padding:50px 20px;text-align:center;}
h1,h2{margin:0}
.controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:20px}
input,button{padding:10px;border-radius:8px;border:1px solid #ccc}
button{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;cursor:pointer;font-weight:600;box-shadow:0 3px 10px rgba(0,0,0,.15)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;padding:20px}
.card{background:var(--card);padding:20px;border-left:5px solid var(--accent);border-radius:14px;box-shadow:0 6px 18px rgba(0,0,0,.08)}
.login{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:20px}
</style>
</head>
<body>
<header><h1>The Reading Room</h1></header>

<div class="hero">
<h2>Shelved & Ready</h2>
<p>Academic archive with upload, search, preview and download support.</p>
</div>

<div class="controls">
<input type="text" id="search" placeholder="Search documents...">
<input type="file" id="upload">
<button onclick="toggleDark()">Dark Mode</button>
</div>

<div class="login">
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login('student')">Student Login</button>
<button onclick="login('admin')">Admin Login</button>
</div>

<div class="grid" id="docs">
<div class="card"><h3>Memory Management & Virtual Memory</h3><button>Preview</button> <button>Download</button></div>
<div class="card"><h3>Operating System Structures</h3><button>Preview</button> <button>Download</button></div>
</div>

<script>
function toggleDark(){document.body.classList.toggle('dark');}
document.getElementById('search').addEventListener('input',e=>{
const v=e.target.value.toLowerCase();
document.querySelectorAll('.card').forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?'block':'none';
});
});
function login(type){
const u=document.getElementById('user').value;
const p=document.getElementById('pass').value;
if(type==='admin' && u==='admin' && p==='admin123') alert('Admin Login Successful');
else if(type==='student') alert('Student Login Successful');
else alert('Invalid credentials');
}
</script>
</body>
</html>
